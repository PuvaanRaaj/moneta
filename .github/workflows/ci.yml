name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — principle of least privilege
permissions:
  contents: read

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts prevents malicious postinstall hooks from dependency supply chain attacks

      - name: Audit dependencies
        run: npm audit --audit-level=high
        # Fails the build on high/critical CVEs

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist exports
        run: node -e "const { money } = require('./dist/index.cjs'); console.log(money('1.00', 'USD').format('en-US'));"
        # Smoke-test the CJS build after bundling
