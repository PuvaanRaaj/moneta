name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # matches v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # matches v1.2.3-beta.1

# id-token is required for npm provenance (SLSA Level 2)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    # 'npm-publish' environment adds a required manual approval gate in GitHub UI

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run
        # Shows exactly what will be published — review this in CI logs

      - name: Publish to npm
        run: npm publish --provenance --access public
        # --provenance links the package to this exact git commit + workflow run (SLSA Level 2)
        # Anyone can verify the package was built from this repo without tampering
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
